_schema-version: 3.3.0
ID: Employee_Travel_Expenses
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: Employee_Travel_Expenses-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: Employee_Travel_Expenses-auth
      - name: Employee_Travel_Expenses-db
      - name: Employee_Travel_Expenses-destination

  - name: Employee_Travel_Expenses-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: Employee_Travel_Expenses-db

  - name: Employee_Travel_Expenses-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: Employee_Travel_Expenses-auth
      - name: srv-api
      - name: Employee_Travel_Expenses-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    build-parameters:
      build-result: app/
      requires:
        - name: Employee_Travel_Expensesapproval_master
          artifacts:
            - approval_master.zip
          target-path: app/
        - name: Employee_Travel_Expensesemployee_master
          artifacts:
            - employee_master.zip
          target-path: app/
        - name: Employee_Travel_Expensesproject_master
          artifacts:
            - project_master.zip
          target-path: app/
        - name: Employee_Travel_Expensestravel_master
          artifacts:
            - travel_master.zip
          target-path: app/

  - name: Employee_Travel_Expensesapproval_master
    type: html5
    path: app/approval_master
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: Employee_Travel_Expensesemployee_master
    type: html5
    path: app/employee_master
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: Employee_Travel_Expensesproject_master
    type: html5
    path: app/project_master
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: Employee_Travel_Expensestravel_master
    type: html5
    path: app/travel_master
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []

  - name: Employee_Travel_Expenses-destinations
    type: com.sap.application.content
    requires:
      - name: Employee_Travel_Expenses-auth
        parameters:
          service-key:
            name: Employee_Travel_Expenses-auth-key
      - name: Employee_Travel_Expenses-html5-repo-host
        parameters:
          service-key:
            name: Employee_Travel_Expenses-html5-repo-host-key
      - name: srv-api
      - name: Employee_Travel_Expenses-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: Employee_Travel_Expenses-html5-repository
              ServiceInstanceName: Employee_Travel_Expenses-html5-repo-host
              ServiceKeyName: Employee_Travel_Expenses-html5-repo-host-key
              sap.cloud.service: Employee_Travel_Expenses.service
            - Name: Employee_Travel_Expenses-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: Employee_Travel_Expenses-auth
              ServiceKeyName: Employee_Travel_Expenses-auth-key
              sap.cloud.service: Employee_Travel_Expenses.service

resources:
  - name: Employee_Travel_Expenses-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: Employee_Travel_Expenses-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
        role-collections:
          - name: 'Admin (Employee_Travel_Expenses ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Admin'
          - name: 'Employee (Employee_Travel_Expenses ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Employee'
          - name: 'Approver (Employee_Travel_Expenses ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.Approver'
  - name: Employee_Travel_Expenses-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: Employee_Travel_Expenses-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: srv-api
                URL: ~{srv-api/srv-url}
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true
    requires:
      - name: srv-api

  - name: Employee_Travel_Expenses-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
